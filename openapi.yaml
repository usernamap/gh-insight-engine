components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT obtenu via l'endpoint /auth/login.
        Format: `Authorization: Bearer <token>`

  schemas:
    # System Schemas
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
        - timestamp
        - uptime
        - environment
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          example: "healthy"
        service:
          type: string
          example: "GitHub Insight Engine API"
        version:
          type: string
          example: "0.1.0"
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
          description: Temps de fonctionnement en secondes
          example: 3600.5
        environment:
          type: string
          enum: [development, staging, production]
          example: "development"

    PingResponse:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
          example: "pong"
        timestamp:
          type: string
          format: date-time

    # Authentication Schemas
    LoginRequest:
      type: object
      required:
        - username
        - fullName
        - githubToken
      properties:
        username:
          type: string
          description: Nom d'utilisateur GitHub
          pattern: '^[a-zA-Z0-9](?:[a-zA-Z0-9]|-(?=[a-zA-Z0-9])){0,38}$'
          example: "octocat"
        fullName:
          type: string
          description: Nom complet de l'utilisateur
          minLength: 1
          maxLength: 100
          example: "John Doe"
        githubToken:
          type: string
          description: Token GitHub Classic avec permissions appropriées
          format: password
          pattern: '^gh[ps]_[A-Za-z0-9]{36}$|^[a-f0-9]{40}$'
          example: "ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

    LoginResponse:
      type: object
      required:
        - success
        - message
        - data
        - timestamp
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Authentification réussie"
        data:
          type: object
          required:
            - token
            - expiresIn
            - user
          properties:
            token:
              type: string
              description: Token JWT pour l'authentification
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            expiresIn:
              type: string
              description: Durée de validité du token
              example: "24h"
            user:
              $ref: '#/components/schemas/AuthenticatedUser'
        timestamp:
          type: string
          format: date-time

    AuthenticatedUser:
      type: object
      required:
        - id
        - username
        - name
        - email
        - avatarUrl
      properties:
        id:
          type: string
          example: "507f1f77bcf86cd799439011"
        username:
          type: string
          example: "octocat"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        avatarUrl:
          type: string
          format: uri
          example: "https://github.com/images/error/octocat_happy.gif"
        bio:
          type: string
          nullable: true
          example: "There once was..."
        company:
          type: string
          nullable: true
          example: "GitHub"
        location:
          type: string
          nullable: true
          example: "San Francisco"



    LogoutResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Déconnexion réussie"



    CurrentUserResponse:
      type: object
      required:
        - user
        - status
        - timestamp
      properties:
        user:
          $ref: '#/components/schemas/AuthenticatedUser'
        status:
          type: object
          required:
            - tokenStatus
            - lastLogin
          properties:
            tokenStatus:
              type: string
              enum: [valid, invalid, expired, error]
              example: "valid"
            lastLogin:
              type: string
              format: date-time
        timestamp:
          type: string
          format: date-time

    # User Schemas
    UserProfile:
      type: object
      required:
        - id
        - login
        - name
        - email
        - avatarUrl
        - followers
        - following
        - publicRepos
        - publicGists
        - createdAt
        - updatedAt
        - type
        - siteAdmin
      properties:
        id:
          type: string
          example: "507f1f77bcf86cd799439011"
        login:
          type: string
          example: "octocat"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
        avatarUrl:
          type: string
          format: uri
        bio:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        blog:
          type: string
          format: uri
          nullable: true
        twitterUsername:
          type: string
          nullable: true
        followers:
          type: integer
          minimum: 0
        following:
          type: integer
          minimum: 0
        publicRepos:
          type: integer
          minimum: 0
        publicGists:
          type: integer
          minimum: 0
        privateRepos:
          type: integer
          minimum: 0
          nullable: true
        ownedPrivateRepos:
          type: integer
          minimum: 0
          nullable: true
        totalPrivateRepos:
          type: integer
          minimum: 0
          nullable: true
        collaborators:
          type: integer
          minimum: 0
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        type:
          type: string
          enum: [User, Organization]
        siteAdmin:
          type: boolean
        hireable:
          type: boolean
          nullable: true
        organizations:
          type: object
          properties:
            totalCount:
              type: integer
            nodes:
              type: array
              items:
                $ref: '#/components/schemas/Organization'

    Organization:
      type: object
      required:
        - login
        - name
        - avatarUrl
      properties:
        login:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri

    UserSearchResponse:
      type: object
      required:
        - users
        - pagination
        - totalCount
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        pagination:
          $ref: '#/components/schemas/Pagination'
        totalCount:
          type: integer
          minimum: 0

    # Repository Schemas
    Repository:
      type: object
      required:
        - id
        - nameWithOwner
        - name
        - isPrivate
        - isArchived
        - isFork
        - isTemplate
        - stargazerCount
        - forkCount
        - watchersCount
        - openIssuesCount
        - pushedAt
        - updatedAt
        - createdAt
        - hasIssuesEnabled
        - hasProjectsEnabled
        - hasWikiEnabled
      properties:
        id:
          type: string
        nameWithOwner:
          type: string
          example: "octocat/Hello-World"
        name:
          type: string
          example: "Hello-World"
        description:
          type: string
          nullable: true
        isPrivate:
          type: boolean
        isArchived:
          type: boolean
        isFork:
          type: boolean
        isTemplate:
          type: boolean
        stargazerCount:
          type: integer
          minimum: 0
        forkCount:
          type: integer
          minimum: 0
        watchersCount:
          type: integer
          minimum: 0
        subscriberCount:
          type: integer
          minimum: 0
          nullable: true
        networkCount:
          type: integer
          minimum: 0
          nullable: true
        openIssuesCount:
          type: integer
          minimum: 0
        primaryLanguage:
          type: string
          nullable: true
          example: "JavaScript"
        languages:
          type: object
          properties:
            totalSize:
              type: integer
            nodes:
              type: array
              items:
                $ref: '#/components/schemas/Language'
        topics:
          type: array
          items:
            type: string
        pushedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        homepageUrl:
          type: string
          format: uri
          nullable: true
        size:
          type: integer
          minimum: 0
        defaultBranchRef:
          type: string
          nullable: true
          example: "main"
        license:
          $ref: '#/components/schemas/License'
        hasIssuesEnabled:
          type: boolean
        hasProjectsEnabled:
          type: boolean
        hasWikiEnabled:
          type: boolean
        hasPages:
          type: boolean
          nullable: true
        hasDownloads:
          type: boolean
          nullable: true
        hasDiscussions:
          type: boolean
          nullable: true
        vulnerabilityAlertsEnabled:
          type: boolean
          nullable: true
        securityPolicyEnabled:
          type: boolean
          nullable: true
        codeOfConductEnabled:
          type: boolean
          nullable: true
        contributingGuidelinesEnabled:
          type: boolean
          nullable: true
        readmeEnabled:
          type: boolean
          nullable: true
        deployments:
          type: object
          properties:
            totalCount:
              type: integer
        environments:
          type: object
          properties:
            totalCount:
              type: integer
        commits:
          type: object
          properties:
            totalCount:
              type: integer
            recent:
              type: array
              items:
                $ref: '#/components/schemas/Commit'
        releases:
          type: object
          properties:
            totalCount:
              type: integer
            latestRelease:
              $ref: '#/components/schemas/Release'
        issues:
          type: object
          properties:
            totalCount:
              type: integer
            openCount:
              type: integer
            closedCount:
              type: integer
        pullRequests:
          type: object
          properties:
            totalCount:
              type: integer
            openCount:
              type: integer
            closedCount:
              type: integer
            mergedCount:
              type: integer
        branchProtectionRules:
          type: object
          properties:
            totalCount:
              type: integer
        collaborators:
          type: object
          properties:
            totalCount:
              type: integer
        # DevOps enrichment fields
        githubActions:
          $ref: '#/components/schemas/GitHubActions'
        security:
          $ref: '#/components/schemas/GitHubSecurity'
        packages:
          $ref: '#/components/schemas/GitHubPackages'
        branchProtection:
          $ref: '#/components/schemas/GitHubBranchProtection'

    Language:
      type: object
      required:
        - name
        - size
        - percentage
      properties:
        name:
          type: string
          example: "JavaScript"
        size:
          type: integer
          minimum: 0
        percentage:
          type: number
          minimum: 0
          maximum: 100

    License:
      type: object
      nullable: true
      properties:
        name:
          type: string
          example: "MIT License"
        spdxId:
          type: string
          example: "MIT"
        url:
          type: string
          format: uri

    Commit:
      type: object
      required:
        - oid
        - message
        - committedDate
        - author
        - additions
        - deletions
        - changedFiles
      properties:
        oid:
          type: string
          example: "6dcb09b5b57875f334f61aebed695e2e4193db5e"
        message:
          type: string
        committedDate:
          type: string
          format: date-time
        author:
          type: object
          properties:
            name:
              type: string
            email:
              type: string
              format: email
        additions:
          type: integer
          minimum: 0
        deletions:
          type: integer
          minimum: 0
        changedFiles:
          type: integer
          minimum: 0

    Release:
      type: object
      nullable: true
      properties:
        name:
          type: string
        tagName:
          type: string
        publishedAt:
          type: string
          format: date-time
        isLatest:
          type: boolean

    GitHubActions:
      type: object
      nullable: true
      properties:
        enabled:
          type: boolean
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/Workflow'

    Workflow:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        state:
          type: string
          enum: [active, disabled]

    GitHubSecurity:
      type: object
      nullable: true
      properties:
        vulnerabilityAlertsEnabled:
          type: boolean
        securityAndAnalysisEnabled:
          type: boolean
        dependabotEnabled:
          type: boolean
        codeQLEnabled:
          type: boolean

    GitHubPackages:
      type: object
      nullable: true
      properties:
        totalCount:
          type: integer
        packages:
          type: array
          items:
            $ref: '#/components/schemas/Package'

    Package:
      type: object
      properties:
        name:
          type: string
        packageType:
          type: string
        visibility:
          type: string
          enum: [public, private]

    GitHubBranchProtection:
      type: object
      nullable: true
      properties:
        enabled:
          type: boolean
        rules:
          type: array
          items:
            $ref: '#/components/schemas/BranchProtectionRule'

    BranchProtectionRule:
      type: object
      properties:
        pattern:
          type: string
        requiresApprovingReviews:
          type: boolean
        requiredApprovingReviewCount:
          type: integer
        requiresStatusChecks:
          type: boolean
        requiresStrictStatusChecks:
          type: boolean

    RepositoryListResponse:
      type: object
      required:
        - repositories
        - pagination
        - totalCount
      properties:
        repositories:
          type: array
          items:
            $ref: '#/components/schemas/Repository'
        pagination:
          $ref: '#/components/schemas/Pagination'
        totalCount:
          type: integer
          minimum: 0

    RepositorySearchResponse:
      type: object
      required:
        - repositories
        - pagination
        - totalCount
      properties:
        repositories:
          type: array
          items:
            $ref: '#/components/schemas/Repository'
        pagination:
          $ref: '#/components/schemas/Pagination'
        totalCount:
          type: integer
          minimum: 0

    # Analytics Schemas
    AnalyzeUserRequest:
      type: object
      properties:
        includePrivate:
          type: boolean
          default: false
          description: Inclure les repositories privés dans l'analyse
        forceRefresh:
          type: boolean
          default: false
          description: Forcer le rafraîchissement des données
        maxAge:
          type: integer
          minimum: 0
          default: 3600
          description: Âge maximum des données en cache (secondes)

    AnalysisStatusResponse:
      type: object
      required:
        - status
        - progress
        - startedAt
      properties:
        status:
          type: string
          enum: [pending, running, completed, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Pourcentage de progression
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        phases:
          type: object
          properties:
            githubData:
              $ref: '#/components/schemas/AnalysisPhase'
            analytics:
              $ref: '#/components/schemas/AnalysisPhase'
            insights:
              $ref: '#/components/schemas/AnalysisPhase'

    AnalysisPhase:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [pending, running, completed, failed]
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true

    AnalyticsOverview:
      type: object
      required:
        - username
        - lastUpdated
        - summary
      properties:
        username:
          type: string
        lastUpdated:
          type: string
          format: date-time
        summary:
          type: object
          required:
            - totalRepositories
            - totalStars
            - totalForks
            - totalCommits
            - primaryLanguages
            - activityScore
          properties:
            totalRepositories:
              type: integer
              minimum: 0
            totalStars:
              type: integer
              minimum: 0
            totalForks:
              type: integer
              minimum: 0
            totalCommits:
              type: integer
              minimum: 0
            primaryLanguages:
              type: array
              items:
                type: string
            activityScore:
              type: number
              minimum: 0
              maximum: 100

    PerformanceScores:
      type: object
      required:
        - username
        - lastUpdated
        - scores
      properties:
        username:
          type: string
        lastUpdated:
          type: string
          format: date-time
        scores:
          type: object
          required:
            - overall
            - productivity
            - quality
            - collaboration
            - innovation
          properties:
            overall:
              $ref: '#/components/schemas/Score'
            productivity:
              $ref: '#/components/schemas/Score'
            quality:
              $ref: '#/components/schemas/Score'
            collaboration:
              $ref: '#/components/schemas/Score'
            innovation:
              $ref: '#/components/schemas/Score'

    Score:
      type: object
      required:
        - value
        - category
      properties:
        value:
          type: number
          minimum: 0
          maximum: 100
        category:
          type: string
          enum: [excellent, good, average, below_average, poor]
        details:
          type: string
        factors:
          type: array
          items:
            type: string

    LanguageAnalysis:
      type: object
      required:
        - username
        - lastUpdated
        - languages
      properties:
        username:
          type: string
        lastUpdated:
          type: string
          format: date-time
        languages:
          type: array
          items:
            $ref: '#/components/schemas/LanguageStats'
        diversity:
          $ref: '#/components/schemas/Score'
        expertise:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Score'

    LanguageStats:
      type: object
      required:
        - name
        - totalBytes
        - percentage
        - repositoryCount
      properties:
        name:
          type: string
        totalBytes:
          type: integer
          minimum: 0
        percentage:
          type: number
          minimum: 0
          maximum: 100
        repositoryCount:
          type: integer
          minimum: 0
        averageCommitsPerRepo:
          type: number
          minimum: 0
        lastUsed:
          type: string
          format: date-time

    ActivityAnalysis:
      type: object
      required:
        - username
        - lastUpdated
        - patterns
      properties:
        username:
          type: string
        lastUpdated:
          type: string
          format: date-time
        patterns:
          type: object
          required:
            - commitFrequency
            - workingHours
            - weeklyActivity
          properties:
            commitFrequency:
              $ref: '#/components/schemas/CommitFrequency'
            workingHours:
              $ref: '#/components/schemas/WorkingHours'
            weeklyActivity:
              $ref: '#/components/schemas/WeeklyActivity'
        trends:
          type: object
          properties:
            productivity:
              $ref: '#/components/schemas/ProductivityTrend'
            consistency:
              $ref: '#/components/schemas/Score'

    CommitFrequency:
      type: object
      required:
        - daily
        - weekly
        - monthly
      properties:
        daily:
          type: number
          minimum: 0
        weekly:
          type: number
          minimum: 0
        monthly:
          type: number
          minimum: 0
        peakDays:
          type: array
          items:
            type: string

    WorkingHours:
      type: object
      properties:
        peakHours:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 23
        timezone:
          type: string
        pattern:
          type: string
          enum: [morning, afternoon, evening, night, distributed]

    WeeklyActivity:
      type: object
      properties:
        mostActiveDay:
          type: string
          enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
        leastActiveDay:
          type: string
          enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
        weekendActivity:
          type: number
          minimum: 0
          maximum: 100

    ProductivityTrend:
      type: object
      properties:
        direction:
          type: string
          enum: [increasing, decreasing, stable]
        changePercentage:
          type: number
        period:
          type: string
          enum: [week, month, quarter, year]

    # Insights Schemas
    InsightGenerationResponse:
      type: object
      required:
        - status
        - message
        - estimatedCompletion
      properties:
        status:
          type: string
          enum: [accepted, processing]
        message:
          type: string
        estimatedCompletion:
          type: string
          format: date-time

    InsightsSummary:
      type: object
      required:
        - username
        - generatedAt
        - summary
      properties:
        username:
          type: string
        generatedAt:
          type: string
          format: date-time
        summary:
          type: object
          required:
            - profileOverview
            - keyStrengths
            - developmentStyle
            - expertise
          properties:
            profileOverview:
              type: string
              description: Vue d'ensemble du profil développeur
            keyStrengths:
              type: array
              items:
                type: string
            developmentStyle:
              type: string
              description: Style de développement identifié
            expertise:
              type: object
              properties:
                level:
                  type: string
                  enum: [junior, intermediate, senior, expert]
                domains:
                  type: array
                  items:
                    type: string

    InsightsRecommendations:
      type: object
      required:
        - username
        - generatedAt
        - recommendations
      properties:
        username:
          type: string
        generatedAt:
          type: string
          format: date-time
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/Recommendation'

    Recommendation:
      type: object
      required:
        - category
        - title
        - description
        - priority
      properties:
        category:
          type: string
          enum: [skills, productivity, collaboration, projects, career]
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        actionItems:
          type: array
          items:
            type: string
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'

    Resource:
      type: object
      required:
        - title
        - url
        - type
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
          enum: [documentation, tutorial, course, book, tool]
        description:
          type: string

    InsightsStrengths:
      type: object
      required:
        - username
        - generatedAt
        - strengths
      properties:
        username:
          type: string
        generatedAt:
          type: string
          format: date-time
        strengths:
          type: array
          items:
            $ref: '#/components/schemas/Strength'

    Strength:
      type: object
      required:
        - area
        - description
        - evidence
        - score
      properties:
        area:
          type: string
          enum: [technical, leadership, collaboration, innovation, productivity]
        description:
          type: string
        evidence:
          type: array
          items:
            type: string
        score:
          type: number
          minimum: 0
          maximum: 100

    InsightsGrowth:
      type: object
      required:
        - username
        - generatedAt
        - growthAreas
      properties:
        username:
          type: string
        generatedAt:
          type: string
          format: date-time
        growthAreas:
          type: array
          items:
            $ref: '#/components/schemas/GrowthArea'

    GrowthArea:
      type: object
      required:
        - area
        - description
        - impact
        - difficulty
      properties:
        area:
          type: string
        description:
          type: string
        impact:
          type: string
          enum: [high, medium, low]
        difficulty:
          type: string
          enum: [easy, moderate, challenging]
        timeline:
          type: string
          enum: [short_term, medium_term, long_term]
        steps:
          type: array
          items:
            type: string

    # New Schemas for missing endpoints
    PlatformStats:
      type: object
      required:
        - users
        - activity
        - timestamp
      properties:
        users:
          type: object
          required:
            - total
            - withDatasets
            - averageFollowers
            - topLanguages
          properties:
            total:
              type: integer
              minimum: 0
            withDatasets:
              type: integer
              minimum: 0
            averageFollowers:
              type: number
              minimum: 0
            topLanguages:
              type: array
              items:
                type: string
        activity:
          type: object
          required:
            - recentAnalyses
            - totalAnalyses
          properties:
            recentAnalyses:
              type: integer
              minimum: 0
            totalAnalyses:
              type: integer
              minimum: 0
        timestamp:
          type: string
          format: date-time

    TrendingRepositoriesResponse:
      type: object
      required:
        - repositories
        - period
        - totalCount
      properties:
        repositories:
          type: array
          items:
            $ref: '#/components/schemas/Repository'
        period:
          type: string
          enum: ['1d', '7d', '30d']
        totalCount:
          type: integer
          minimum: 0
        timestamp:
          type: string
          format: date-time

    ProductivityScore:
      type: object
      required:
        - username
        - lastUpdated
        - score
      properties:
        username:
          type: string
        lastUpdated:
          type: string
          format: date-time
        score:
          $ref: '#/components/schemas/Score'
        metrics:
          type: object
          properties:
            commitsPerDay:
              type: number
              minimum: 0
            linesOfCodePerCommit:
              type: number
              minimum: 0
            issuesClosedPerWeek:
              type: number
              minimum: 0

    DevOpsMaturity:
      type: object
      required:
        - username
        - lastUpdated
        - maturityLevel
      properties:
        username:
          type: string
        lastUpdated:
          type: string
          format: date-time
        maturityLevel:
          type: string
          enum: [beginner, intermediate, advanced, expert]
        practices:
          type: object
          properties:
            cicd:
              $ref: '#/components/schemas/Score'
            testing:
              $ref: '#/components/schemas/Score'
            monitoring:
              $ref: '#/components/schemas/Score'
            security:
              $ref: '#/components/schemas/Score'

    SkillAssessment:
      type: object
      required:
        - username
        - generatedAt
        - skills
      properties:
        username:
          type: string
        generatedAt:
          type: string
          format: date-time
        skills:
          type: array
          items:
            type: object
            required:
              - name
              - level
              - confidence
            properties:
              name:
                type: string
              level:
                type: string
                enum: [beginner, intermediate, advanced, expert]
              confidence:
                type: number
                minimum: 0
                maximum: 100
              evidence:
                type: array
                items:
                  type: string

    DeveloperPersonality:
      type: object
      required:
        - username
        - generatedAt
        - personality
      properties:
        username:
          type: string
        generatedAt:
          type: string
          format: date-time
        personality:
          type: object
          required:
            - type
            - traits
            - workStyle
          properties:
            type:
              type: string
              description: Type de personnalité développeur
              example: "Innovator"
            traits:
              type: array
              items:
                type: string
              example: ["Creative", "Analytical", "Problem-solver"]
            workStyle:
              type: string
              example: "Collaborative and detail-oriented"
            strengths:
              type: array
              items:
                type: string
            challenges:
              type: array
              items:
                type: string

    CareerInsights:
      type: object
      required:
        - username
        - generatedAt
        - insights
      properties:
        username:
          type: string
        generatedAt:
          type: string
          format: date-time
        insights:
          type: object
          required:
            - currentLevel
            - nextSteps
            - recommendations
          properties:
            currentLevel:
              type: string
              enum: [junior, mid, senior, lead, principal]
            nextSteps:
              type: array
              items:
                type: string
            recommendations:
              type: array
              items:
                type: object
                properties:
                  category:
                    type: string
                  suggestion:
                    type: string
                  priority:
                    type: string
                    enum: [high, medium, low]

    LanguagesStats:
      type: object
      required:
        - totalRepositories
        - languages
        - timestamp
      properties:
        totalRepositories:
          type: integer
          minimum: 0
        languages:
          type: array
          items:
            type: object
            required:
              - name
              - repositoryCount
              - percentage
            properties:
              name:
                type: string
              repositoryCount:
                type: integer
                minimum: 0
              percentage:
                type: number
                minimum: 0
                maximum: 100
              totalBytes:
                type: integer
                minimum: 0
        timestamp:
          type: string
          format: date-time

    # Common Schemas
    Pagination:
      type: object
      required:
        - page
        - limit
        - totalPages
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean
        nextPage:
          type: integer
          nullable: true
        previousPage:
          type: integer
          nullable: true

    Error:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
          description: Code d'erreur
        message:
          type: string
          description: Message d'erreur lisible
        details:
          type: object
          description: Détails supplémentaires sur l'erreur
        timestamp:
          type: string
          format: date-time
        path:
          type: string
          description: Chemin de la requête qui a causé l'erreur
        requestId:
          type: string
          description: Identifiant unique de la requête

    ValidationError:
      type: object
      required:
        - error
        - message
        - timestamp
        - details
      properties:
        error:
          type: string
          example: "VALIDATION_ERROR"
        message:
          type: string
          example: "Erreur de validation des données"
        timestamp:
          type: string
          format: date-time
        path:
          type: string
          description: Chemin de l'endpoint
        method:
          type: string
          description: Méthode HTTP
        details:
          type: array
          items:
            type: object
            required:
              - field
              - message
              - code
            properties:
              field:
                type: string
                description: Champ en erreur
              message:
                type: string
                description: Message d'erreur pour ce champ
              code:
                type: string
                description: Code d'erreur spécifique
              received:
                description: Valeur reçue (si applicable)

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

    Unauthorized:
      description: Non autorisé - Token manquant ou invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized"
            message: "Token d'authentification requis"
            timestamp: "2024-01-15T10:30:00.000Z"

    Forbidden:
      description: Accès interdit - Permissions insuffisantes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Forbidden"
            message: "Vous n'avez pas les permissions pour accéder à cette ressource"
            timestamp: "2024-01-15T10:30:00.000Z"

    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Not Found"
            message: "La ressource demandée n'existe pas"
            timestamp: "2024-01-15T10:30:00.000Z"

    TooManyRequests:
      description: Trop de requêtes - Rate limit dépassé
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Too Many Requests"
            message: "Rate limit dépassé. Réessayez dans 15 minutes."
            timestamp: "2024-01-15T10:30:00.000Z"
      headers:
        Retry-After:
          description: Nombre de secondes à attendre avant de réessayer
          schema:
            type: integer
        X-RateLimit-Limit:
          description: Limite de requêtes par période
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Nombre de requêtes restantes
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Timestamp de réinitialisation du rate limit
          schema:
            type: integer



tags:
  - name: System
    description: Endpoints système (health check, ping)
  - name: Authentication
    description: Authentification et gestion des tokens JWT
  - name: Users
    description: Gestion des utilisateurs GitHub
  - name: Repositories
    description: Recherche et gestion des repositories
  - name: Analytics
    description: Analyses quantitatives et métriques
  - name: Insights
    description: Insights IA qualitatifs et recommandations

externalDocs:
  description: Documentation complète de l'API
  url: https://docs.gh-insight-engine.com 