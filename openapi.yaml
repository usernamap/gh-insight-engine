openapi: 3.0.3
info:
  title: GitHub Insight Engine API
  description: |
    API REST pour l'analyse en profondeur des données GitHub avec insights IA.
    
    Cette API permet d'analyser les profils GitHub, repositories et de générer des insights 
    quantitatifs et qualitatifs grâce à l'intelligence artificielle.
    
    ## Authentification
    L'API utilise l'authentification JWT Bearer Token. Pour vous connecter, utilisez votre token GitHub Classic.
    
    ## Rate Limiting
    - Global: 100 requêtes par 15 minutes par IP
    - Authentification: 5 tentatives par 15 minutes par IP  
    - Analyses: 10 analyses par heure par IP
    
    ## Workflow d'analyse
    1. Connexion avec token GitHub Classic
    2. Lancement d'analyse utilisateur (GitHub + Analytics)
    3. Génération d'insights IA
    4. Consultation des résultats
  version: 0.1.4
  contact:
    name: GitHub Insight Engine Support
    url: https://github.com/org/gh-insight-engine
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  
servers:
  - url: http://localhost:3000/api
    description: Serveur de développement
  - url: https://api.gh-insight-engine.com/api
    description: Serveur de production

security:
  - BearerAuth: []
  - {}

paths:
  /health:
    get:
      summary: Health check du service
      description: Vérifie l'état de santé de l'API et retourne des informations système
      operationId: healthCheck
      tags:
        - System
      security: []
      responses:
        '200':
          description: Service en fonctionnement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ping:
    get:
      summary: Test de connectivité simple
      description: Test de connectivité basique pour vérifier que l'API répond
      operationId: ping
      tags:
        - System
      security: []
      responses:
        '200':
          description: Pong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'

  /auth/login:
    post:
      summary: Authentification avec token GitHub
      description: |
        Authentification avec token GitHub Classic et génération d'un JWT.
        Le token GitHub doit avoir les permissions appropriées pour accéder aux données privées.
      operationId: login
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'



  /auth/refresh:
    post:
      summary: Rafraîchissement du token JWT
      description: Génère un nouveau token JWT à partir d'un token valide
      operationId: refreshToken
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: Token de rafraîchissement
      responses:
        '200':
          description: Token rafraîchi avec succès
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                  - expiresIn
                properties:
                  token:
                    type: string
                    description: Nouveau token JWT
                  expiresIn:
                    type: string
                    description: Durée de validité
                    example: "24h"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/validate:
    get:
      summary: Validation du token JWT
      description: Vérifie la validité du token JWT courant
      operationId: validateToken
      tags:
        - Authentication
      responses:
        '200':
          description: Token valide
          content:
            application/json:
              schema:
                type: object
                required:
                  - valid
                  - expiresAt
                properties:
                  valid:
                    type: boolean
                    example: true
                  expiresAt:
                    type: string
                    format: date-time
                  user:
                    $ref: '#/components/schemas/AuthenticatedUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    delete:
      summary: Déconnexion
      description: Invalide le token JWT courant
      operationId: logout
      tags:
        - Authentication
      responses:
        '200':
          description: Déconnexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'



  /auth/me:
    get:
      summary: Information sur l'utilisateur connecté
      description: Retourne les informations du profil de l'utilisateur authentifié
      operationId: getCurrentUser
      tags:
        - Authentication
      responses:
        '200':
          description: Informations utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/search:
    get:
      summary: Recherche d'utilisateurs avec filtres
      description: |
        Recherche d'utilisateurs GitHub avec filtres avancés.
        Permet de filtrer par localisation, langage, nombre de followers, etc.
      operationId: searchUsers
      tags:
        - Users
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: query
          in: query
          description: Terme de recherche dans le nom d'utilisateur ou nom complet
          schema:
            type: string
            example: "john"
        - name: location
          in: query
          description: Localisation de l'utilisateur
          schema:
            type: string
            example: "Paris"
        - name: language
          in: query
          description: Langage de programmation principal
          schema:
            type: string
            example: "JavaScript"
        - name: minFollowers
          in: query
          description: Nombre minimum de followers
          schema:
            type: integer
            minimum: 0
            example: 100
        - name: minRepos
          in: query
          description: Nombre minimum de repositories publics
          schema:
            type: integer
            minimum: 0
            example: 10
        - name: page
          in: query
          description: Numéro de page (commence à 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: Champ de tri
          schema:
            type: string
            enum: [followers, repositories, created, updated]
            default: followers
        - name: sortOrder
          in: query
          description: Ordre de tri
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Liste des utilisateurs trouvés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{username}:
    get:
      summary: Récupération du profil d'un utilisateur
      description: |
        Récupère le profil complet d'un utilisateur GitHub.
        Inclut les informations publiques et privées si l'utilisateur authentifié en a les droits.
      operationId: getUserProfile
      tags:
        - Users
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: username
          in: path
          required: true
          description: Nom d'utilisateur GitHub
          schema:
            type: string
            pattern: '^[a-zA-Z0-9](?:[a-zA-Z0-9]|-(?=[a-zA-Z0-9])){0,38}$'
            example: "octocat"
      responses:
        '200':
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Suppression des données utilisateur (GDPR)
      description: |
        Supprime toutes les données associées à un utilisateur pour conformité GDPR.
        Seul le propriétaire du compte peut supprimer ses propres données.
      operationId: deleteUserData
      tags:
        - Users
      parameters:
        - name: username
          in: path
          required: true
          description: Nom d'utilisateur GitHub
          schema:
            type: string
            pattern: '^[a-zA-Z0-9](?:[a-zA-Z0-9]|-(?=[a-zA-Z0-9])){0,38}$'
      responses:
        '200':
          description: Données supprimées avec succès
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - deleted
                  - compliance
                  - timestamp
                properties:
                  message:
                    type: string
                    example: "Données utilisateur supprimées avec succès"
                  deleted:
                    type: object
                    properties:
                      user:
                        type: integer
                      repositories:
                        type: integer
                      datasets:
                        type: integer
                  compliance:
                    type: string
                    example: "GDPR"
                  timestamp:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{username}/status:
    get:
      summary: Statut de l'analyse d'un utilisateur
      description: Récupère le statut de progression d'une analyse utilisateur
      operationId: getUserAnalysisStatus
      tags:
        - Users
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: username
          in: path
          required: true
          description: Nom d'utilisateur GitHub
          schema:
            type: string
            pattern: '^[a-zA-Z0-9](?:[a-zA-Z0-9]|-(?=[a-zA-Z0-9])){0,38}$'
      responses:
        '200':
          description: Statut de l'analyse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/stats:
    get:
      summary: Statistiques globales des utilisateurs
      description: Récupère les statistiques globales de la plateforme
      operationId: getUsersStats
      tags:
        - Users
      security:
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: Statistiques globales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformStats'

  /users/{username}/repositories:
    get:
      summary: Liste des repositories d'un utilisateur
      description: |
        Récupère la liste des repositories d'un utilisateur avec données DevOps enrichies.
        Inclut les repositories privés si l'utilisateur authentifié en a les droits.
      operationId: getUserRepositories
      tags:
        - Users
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: username
          in: path
          required: true
          description: Nom d'utilisateur GitHub
          schema:
            type: string
            pattern: '^[a-zA-Z0-9](?:[a-zA-Z0-9]|-(?=[a-zA-Z0-9])){0,38}$'
        - name: includePrivate
          in: query
          description: Inclure les repositories privés (nécessite authentification)
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Liste des repositories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /repositories/search:
    get:
      summary: Recherche de repositories avec filtres avancés
      description: |
        Recherche de repositories GitHub avec filtres avancés.
        Permet de filtrer par langage, sujet, nombre d'étoiles, etc.
      operationId: searchRepositories
      tags:
        - Repositories
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: query
          in: query
          description: Terme de recherche dans le nom ou description
          schema:
            type: string
        - name: language
          in: query
          description: Langage de programmation principal
          schema:
            type: string
        - name: topic
          in: query
          description: Sujet/tag du repository
          schema:
            type: string
        - name: minStars
          in: query
          description: Nombre minimum d'étoiles
          schema:
            type: integer
            minimum: 0
        - name: minForks
          in: query
          description: Nombre minimum de forks
          schema:
            type: integer
            minimum: 0
        - name: isPrivate
          in: query
          description: Repository privé (nécessite authentification)
          schema:
            type: boolean
        - name: isFork
          in: query
          description: Est un fork
          schema:
            type: boolean
        - name: isArchived
          in: query
          description: Est archivé
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [stars, forks, updated, created]
            default: stars
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Liste des repositories trouvés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositorySearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /repositories/languages/stats:
    get:
      summary: Statistiques des langages de programmation
      description: |
        Récupère les statistiques globales des langages de programmation
        utilisés dans tous les repositories de la plateforme.
      operationId: getLanguagesStats
      tags:
        - Repositories
      security:
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: Statistiques des langages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguagesStats'

  /repositories/trending:
    get:
      summary: Repositories tendance
      description: |
        Récupère les repositories tendance par période et langage.
        Permet de découvrir les projets populaires récemment.
      operationId: getTrendingRepositories
      tags:
        - Repositories
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: period
          in: query
          description: Période de tendance
          schema:
            type: string
            enum: ['1d', '7d', '30d']
            default: '7d'
        - name: language
          in: query
          description: Langage de programmation
          schema:
            type: string
        - name: limit
          in: query
          description: Nombre de repositories à retourner
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Liste des repositories tendance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendingRepositoriesResponse'

  /repositories/{owner}/{repo}:
    get:
      summary: Récupération des détails d'un repository
      description: |
        Récupère les détails complets d'un repository avec données DevOps.
        Inclut les informations privées si l'utilisateur authentifié en a les droits.
      operationId: getRepository
      tags:
        - Repositories
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: owner
          in: path
          required: true
          description: Propriétaire du repository
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: Nom du repository
          schema:
            type: string
      responses:
        '200':
          description: Détails du repository
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
        '404':
          $ref: '#/components/responses/NotFound'

  /repositories/{owner}/{repo}/enrich:
    post:
      summary: Enrichissement DevOps d'un repository
      description: |
        Lance l'enrichissement DevOps d'un repository avec données avancées.
        Nécessite une authentification pour accéder aux données privées.
      operationId: enrichRepository
      tags:
        - Repositories
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Repository enrichi avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /analytics/{username}/analyze:
    post:
      summary: Lance une analyse complète d'un utilisateur
      description: |
        Lance une analyse complète d'un utilisateur (GitHub + Analytics).
        Cette opération peut prendre plusieurs minutes et est limitée en fréquence.
      operationId: analyzeUser
      tags:
        - Analytics
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeUserRequest'
      responses:
        '202':
          description: Analyse lancée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /analytics/{username}/overview:
    get:
      summary: Vue d'ensemble des métriques
      description: Récupère une vue d'ensemble des métriques analytiques d'un utilisateur
      operationId: getAnalyticsOverview
      tags:
        - Analytics
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vue d'ensemble des métriques
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsOverview'
        '404':
          $ref: '#/components/responses/NotFound'

  /analytics/{username}/performance:
    get:
      summary: Scores de performance
      description: Récupère les scores de performance calculés pour un utilisateur
      operationId: getPerformanceScores
      tags:
        - Analytics
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scores de performance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceScores'
        '404':
          $ref: '#/components/responses/NotFound'

  /analytics/{username}/languages:
    get:
      summary: Analyse des langages
      description: Récupère l'analyse détaillée des langages de programmation utilisés
      operationId: getLanguageAnalysis
      tags:
        - Analytics
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Analyse des langages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageAnalysis'
        '404':
          $ref: '#/components/responses/NotFound'

  /analytics/{username}/activity:
    get:
      summary: Analyse d'activité
      description: Récupère l'analyse d'activité et des patterns de développement
      operationId: getActivityAnalysis
      tags:
        - Analytics
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Analyse d'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityAnalysis'
        '404':
          $ref: '#/components/responses/NotFound'

  /analytics/{username}/productivity:
    get:
      summary: Score de productivité
      description: Récupère le score de productivité et métriques associées
      operationId: getProductivityScore
      tags:
        - Analytics
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Score de productivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductivityScore'
        '404':
          $ref: '#/components/responses/NotFound'

  /analytics/{username}/devops:
    get:
      summary: Maturité DevOps
      description: Récupère l'évaluation de maturité DevOps et pratiques de développement
      operationId: getDevOpsMaturity
      tags:
        - Analytics
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Maturité DevOps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevOpsMaturity'
        '404':
          $ref: '#/components/responses/NotFound'

  /insights/{username}/generate:
    post:
      summary: Génération d'insights IA pour un utilisateur
      description: |
        Lance la génération d'insights IA pour un utilisateur.
        Cette opération utilise OpenAI et est très coûteuse, donc limitée en fréquence.
      operationId: generateInsights
      tags:
        - Insights
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Génération d'insights lancée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightGenerationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /insights/{username}/summary:
    get:
      summary: Résumé IA du profil
      description: Récupère le résumé IA du profil développeur
      operationId: getInsightsSummary
      tags:
        - Insights
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Résumé IA du profil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /insights/{username}/recommendations:
    get:
      summary: Recommandations IA
      description: Récupère les recommandations IA basées sur l'analyse du profil
      operationId: getInsightsRecommendations
      tags:
        - Insights
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Recommandations IA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsRecommendations'
        '404':
          $ref: '#/components/responses/NotFound'

  /insights/{username}/strengths:
    get:
      summary: Forces identifiées
      description: Récupère les forces identifiées par l'IA
      operationId: getInsightsStrengths
      tags:
        - Insights
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Forces identifiées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsStrengths'
        '404':
          $ref: '#/components/responses/NotFound'

  /insights/{username}/growth:
    get:
      summary: Axes d'amélioration
      description: Récupère les axes d'amélioration suggérés par l'IA
      operationId: getInsightsGrowth
      tags:
        - Insights
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Axes d'amélioration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsGrowth'
        '404':
          $ref: '#/components/responses/NotFound'

  /insights/{username}/personality:
    get:
      summary: Personnalité de développeur
      description: Récupère l'analyse de personnalité de développeur par l'IA
      operationId: getDeveloperPersonality
